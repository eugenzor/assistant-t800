[ErrorCode]
UNKNOWN_INTERFACE_MODE = Unknown interface mode: "{mode}". Use: cli or tui.
UNKNOWN_COMMAND = Unknown command: "{command}".
EMPTY_COMMAND = Command is empty.
INVALID_COMMAND_SYNTAX = Invalid syntax for "{command}". Use: {syntax}
INVALID_QUOTES_SYNTAX = Invalid quotes syntax. Check that all quotes are closed.
COMMAND_PARSE_ERROR = Cannot parse command: {reason}
MISSING_ARGUMENTS = Missing arguments for "{command}". Use: {syntax}
EXTRA_ARGUMENTS = Too many arguments for "{command}". {hint}
INCORRECT_ARGUMENTS = Incorrect arguments for "{command}". {hint}
VALIDATION_ERROR = Validation error: {reason}
CONTACT_NOT_FOUND = Contact "{name}" was not found.
CONTACTS_NOT_FOUND = Contacts are missing.
NAME_NOT_FOUND = "{query}" was not found in contact names.
QUERY_NOT_FOUND = "{query}" was not found in contacts.
EMAIL_NOT_FOUND = "{query}" was not found in contact E-mails.
PHONE_NOT_FOUND = "{query}" was not found in contact phone numbers.
TAG_NOT_FOUND = "{query}" was not found in contact tags.
NOTE_NOT_FOUND = "{query}" was not found in contact notes.
CONTACT_ALREADY_EXISTS = Contact "{name}" already exists.
CONTACT_VALUE_NOT_FOUND = Contact value was not found: {value}
CONTACT_FIELD_EMPTY = Contact field is already empty: {field}
INVALID_DAYS = Number of days must be valid.
EMPTY_NAME = Name cannot be empty.
INVALID_PHONE = Invalid phone number.
INVALID_EMAIL = Invalid email address.
EMPTY_ADDRESS = Address cannot be empty.
INVALID_BIRTHDAY_FORMAT = Invalid date format. Use DD.MM.YYYY.
FUTURE_BIRTHDAY = Birthday cannot be in the future.
INVALID_PHONE_DIGITS_RANGE = Invalid phone number. Expected 10-15 digits.
PHONE_NOT_RECOGNIZED = Phone number was not recognized.
SUGGEST_TAGS_FAILED = Tag suggestion failed: {reason}
SUGGEST_TAGS_INTERACTIVE_ONLY = Command "{command}" is interactive. Run it without extra arguments, or use "edit-tags" to set tags directly.
NOT_IMPLEMENTED = Not yet implemented.
UNEXPECTED_ERROR = Unexpected error: {reason}
