HELP_DESCRIPTION = Show available commands.
EXIT_DESCRIPTION = Close the assistant.
ADD_DESCRIPTION = Create a new contact.
CONTACTS_DESCRIPTION = Show all contacts.
GET_DESCRIPTION = Show one contact by name.
SEARCH_DESCRIPTION = Search contacts by all available fields.
SEARCH_NAME_DESCRIPTION = Search contacts by name.
SEARCH_PHONE_DESCRIPTION = Search contacts by phone.
SEARCH_EMAIL_DESCRIPTION = Search contacts by email.
SEARCH_NOTE_DESCRIPTION = Search contacts by note text.
SEARCH_TAG_DESCRIPTION = Search contacts by tag.
BIRTHDAYS_DESCRIPTION = Show contacts to congratulate within the selected number of days.
SET_ADDRESS_DESCRIPTION = Set or replace a contact address.
SET_BIRTHDAY_DESCRIPTION = Set or replace a contact birthday.
ADD_PHONE_DESCRIPTION = Add one or more phones to a contact.
ADD_EMAIL_DESCRIPTION = Add one or more emails to a contact.
REMOVE_DESCRIPTION = Delete a whole contact.
REMOVE_ADDRESS_DESCRIPTION = Remove a contact address.
REMOVE_BIRTHDAY_DESCRIPTION = Remove a contact birthday.
REMOVE_PHONE_DESCRIPTION = Remove one or more phones from a contact.
REMOVE_EMAIL_DESCRIPTION = Remove one or more emails from a contact.
EDIT_NOTE_DESCRIPTION = Edit a contact note.
REMOVE_NOTE_DESCRIPTION = Remove a contact note.
ADD_TAG_DESCRIPTION = Add one or more tags to a contact.
REMOVE_TAG_DESCRIPTION = Remove one or more tags from a contact.

[ErrorCode]
UNKNOWN_INTERFACE_MODE = Unknown interface mode: "{mode}". Use: cli or tui.
UNKNOWN_COMMAND = Unknown command: "{command}".
EMPTY_COMMAND = Command is empty.
INVALID_COMMAND_SYNTAX = Invalid syntax for "{command}". Use: {syntax}
COMMAND_PARSE_ERROR = Cannot parse command: {reason}
MISSING_ARGUMENTS = Missing arguments for "{command}". Use: {syntax}
EXTRA_ARGUMENTS = Too many arguments for "{command}". {hint}
INCORRECT_ARGUMENTS = Incorrect arguments for "{command}". {hint}
VALIDATION_ERROR = Validation error: {reason}
CONTACT_NOT_FOUND = Contact "{name}" was not found.
CONTACT_ALREADY_EXISTS = Contact "{name}" already exists.
CONTACT_VALUE_NOT_FOUND = Contact value was not found: {value}
CONTACT_FIELD_EMPTY = Contact field is already empty: {field}
INVALID_DAYS = Number of days must be valid.
NOT_IMPLEMENTED = Not yet implemented.
UNEXPECTED_ERROR = Unexpected error: {reason}
