name: Tests

on:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest
